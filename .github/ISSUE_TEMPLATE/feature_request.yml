name: Feature Request
description: 提出新功能或改进建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: skill
    attributes:
      label: 关联 Skill
      description: 这个建议针对哪个 skill？如果是新 skill 请选择"其他"
      options:
        - ai-agent-workflow
        - bestie
        - bishe-manual-skill
        - digital-self
        - github-job-showcase
        - java-fullstack-engineering
        - last30days
        - last30days-cn-skill
        - local-ai-systems-studio
        - lunwen
        - lz-docforge
        - office-doc-presentation
        - xhs-cover-studio
        - xiaohongshu-content-studio
        - 新 skill
        - 其他 / 根仓库
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清楚地描述你想要的功能
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 使用场景
      description: 为什么需要这个功能？解决什么问题？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些替代方案？
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 截图、参考链接等
    validations:
      required: false
