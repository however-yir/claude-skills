name: Bug Report
description: 报告一个 bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: skill
    attributes:
      label: 影响的 Skill
      description: 选择出问题的 skill
      options:
        - ai-agent-workflow
        - bestie
        - bishe-manual-skill
        - digital-self
        - github-job-showcase
        - java-fullstack-engineering
        - last30days
        - last30days-cn-skill
        - local-ai-systems-studio
        - lunwen
        - lz-docforge
        - office-doc-presentation
        - xhs-cover-studio
        - xiaohongshu-content-studio
        - 其他 / 根仓库
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: Claude Code / Codex 版本、操作系统、Python/Node 版本等
      placeholder: |
        - Claude Code version:
        - OS: macOS 15.x / Ubuntu 24.04 / ...
        - Python: 3.12
        - Node: 20.x
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请描述如何触发这个 bug
      placeholder: |
        1. 安装 skill ...
        2. 执行命令 ...
        3. 观察到 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？附上错误信息或截图
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 其他有助于排查的信息
    validations:
      required: false
