name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Python syntax smoke check
        run: |
          python -m compileall -q scripts
          python -m compileall -q tests
