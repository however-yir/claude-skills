interface:
  display_name: "BiShe Manual"
  short_description: "Write and deliver Chinese graduation design manuals with sample/template analysis, references, figures, screenshots, and DOCX output."
  default_prompt: "Use this skill to write or revise a Chinese graduation design manual based on real project facts, sample manuals, templates, references, figures, screenshots, and DOCX delivery. Before writing, ask for local file paths for template/sample/opening report/task book and separate required inputs from optional inputs. If a sample or template is DOCX, run `python tools/analyze_docx.py <sample.docx> --json-out output/style-profile.json`. If a sample is PDF, run `python tools/analyze_sample_pdf.py <sample.pdf> --json-out output/sample-analysis.json`. After analysis, return a structured package with directory proposal, target chapter lengths, extracted styles, and conflict items, then explicitly wait for user confirmation before writing. During writing, run `python tools/count_chapter_words.py <manual.md>` to control length, and run `python tools/ensure_thesis_assets.py <manual.md> --check-only` to verify required figures/tables/screenshots. When screenshot placeholders exist, use `python tools/extract_screenshot_placeholders.py <manual.md> --json-out labels.json`, `python tools/build_screenshot_plan.py labels.json output/screenshot-plan.json --base-url <system-url>`, then `python tools/capture_thesis_screenshots.py output/screenshot-plan.json` to produce `image-map.json`. Before DOCX delivery, remove Markdown markers like `**` and links from正文, then generate with `python tools/generate_thesis_docx.py <source.md> <target.docx> --style-profile output/style-profile.json --image-map image-map.json`. Do not silently skip missing images: keep placeholders or warnings in the final DOCX."
